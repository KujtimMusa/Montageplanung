# Wendet Migrationen aus supabase/migrations/ auf das Remote-Projekt an.
# Secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_ID (Reference ID)
# DB-Passwort nur nötig für direkte Postgres-Tools (psql, pg_dump, --db-url), nicht für diesen Push-Flow.
# Siehe: https://supabase.com/docs/guides/cli/managing-environments

name: Deploy Supabase migrations

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/deploy-supabase-migrations.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push migrations
        run: supabase db push
